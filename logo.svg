<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 140" width="400" height="140">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8a45c"/>
      <stop offset="50%" style="stop-color:#e8c97a"/>
      <stop offset="100%" style="stop-color:#a8893c"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c8a45c"/>
      <stop offset="100%" style="stop-color:#d4b06a"/>
    </linearGradient>
  </defs>

  <!-- Background rings -->
  <circle cx="60" cy="70" r="48" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
  <circle cx="60" cy="70" r="38" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.4"/>

  <!-- Wine glass icon -->
  <g transform="translate(60,70)">
    <path d="M-6,-22 Q-8,-10 -10,2 Q-10,10 -6,14 Q0,18 6,14 Q10,10 10,2 Q8,-10 6,-22" 
          fill="none" stroke="url(#gold)" stroke-width="2" stroke-linecap="round"/>
    <path d="M-3,-22 Q0,-30 3,-22" fill="none" stroke="url(#gold)" stroke-width="2" stroke-linecap="round"/>
    <rect x="-2" y="14" width="4" height="10" rx="1" fill="url(#gold)"/>
    <path d="M-6,24 Q0,28 6,24" fill="none" stroke="url(#gold)" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- 4 BLACK DM text -->
  <text x="125" y="50" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="42" font-weight="900" fill="#1a1a2e" letter-spacing="2">4</text>
  <text x="168" y="50" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="26" font-weight="800" fill="#1a1a2e" letter-spacing="3">BLACK DM</text>

  <!-- Tagline -->
  <text x="125" y="80" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="10" font-weight="600" fill="#c8a45c" letter-spacing="3">PREMIUM FOOD · BEVERAGE · WINE</text>

  <!-- Decorative line -->
  <line x1="125" y1="92" x2="380" y2="92" stroke="url(#gold2)" stroke-width="1" opacity="0.5"/>

  <!-- Bottom line text -->
  <text x="125" y="112" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="9" font-weight="400" fill="#999" letter-spacing="4">GLOBAL TRADE &amp; SOURCING</text>
</svg>