<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c8a45c"/>
      <stop offset="100%" style="stop-color:#a8893c"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#2d2d4a"/>
    </linearGradient>
  </defs>

  <!-- Globe base -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="url(#g)" stroke-width="3"/>

  <!-- Longitude lines -->
  <ellipse cx="50" cy="50" rx="10" ry="44" fill="none" stroke="url(#g)" stroke-width="1.8" opacity=".45"/>
  <ellipse cx="50" cy="50" rx="26" ry="44" fill="none" stroke="url(#g)" stroke-width="1.2" opacity=".3"/>

  <!-- Latitude lines -->
  <ellipse cx="50" cy="50" rx="44" ry="14" fill="none" stroke="url(#g)" stroke-width="1.5" opacity=".4"/>
  <ellipse cx="50" cy="50" rx="44" ry="28" fill="none" stroke="url(#g)" stroke-width="1.2" opacity=".25"/>

  <!-- Trade arrows: left-right -->
  <g transform="translate(50,50)">
    <!-- Arrow left -->
    <line x1="-4" y1="-38" x2="-4" y2="-18" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-4" y1="-18" x2="-12" y2="-26" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="-4" y1="-18" x2="4" y2="-26" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Arrow right -->
    <line x1="4" y1="38" x2="4" y2="18" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="4" y1="18" x2="-4" y2="26" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="4" y1="18" x2="12" y2="26" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Small dots on route -->
  <circle cx="18" cy="18" r="2.5" fill="url(#g)"/>
  <circle cx="82" cy="82" r="2.5" fill="url(#g)"/>
</svg>